<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOL 2026 · Badge Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Page / Controls ── */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a1a; color: #e0e0e0; font-family: 'Inter', system-ui, sans-serif; }
.controls {
  background: #111; border-bottom: 1px solid #333;
  padding: 18px 24px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  position: sticky; top: 0; z-index: 100;
}
.controls h1 { font-size: 16px; font-weight: 700; color: #D4A72C; flex: 1; min-width: 160px; }
.ctrl-grp { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.ctrl-label { font-size: 12px; color: #777; }
select, input[type=text] {
  background: #222; border: 1px solid #444; color: #e0e0e0;
  border-radius: 7px; padding: 7px 12px; font-size: 13px; font-family: inherit; outline: none;
}
select:focus, input:focus { border-color: #D4A72C; }
.btn {
  background: #D4A72C; color: #000; border: none; border-radius: 8px;
  padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
  transition: background .18s;
}
.btn:hover { background: #F0D980; }
.btn-outline { background: transparent; border: 1px solid #555; color: #ccc; }
.btn-outline:hover { border-color: #D4A72C; color: #D4A72C; }
.url-area { display: flex; gap: 8px; align-items: center; background: #181818; border: 1px solid #333; border-radius: 10px; padding: 10px 16px; margin: 16px 24px; }
.url-label { font-size: 11px; color: #777; letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; }
.url-area input { flex: 1; background: none; border: none; color: #ccc; font-size: 13px; font-family: 'Inter', monospace; outline: none; }
.url-note { font-size: 11px; color: #555; margin: -8px 24px 12px; }
.count-bar { padding: 8px 24px; font-size: 12px; color: #666; }

/* ── Badge Grid ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 20px;
  padding: 20px 24px 60px;
}

/* ── Badge Card ── */
.badge {
  width: 220px;
  /* Approx 54mm × 86mm card in pixels (at 96dpi ≈ 204×325) — scaled for screen */
  aspect-ratio: 220 / 346;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.07);
  display: flex;
  flex-direction: column;
  background: #fff;
  font-family: 'Cormorant Garamond', serif;
}

/* Top black section */
.badge-top {
  background: #000;
  flex: 0 0 20%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  padding: 4px 0 3px;
}
.badge-fol {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: 10px;
  color: #fff;
  line-height: 1;
  text-shadow: 0 0 20px rgba(212,167,44,0.25);
}
.badge-year-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 2px;
}
.badge-year-line { flex: 1; height: 1px; background: rgba(255,255,255,0.3); width: 18px; }
.badge-year { font-size: 8px; letter-spacing: 5px; color: #ccc; font-family: 'Inter', sans-serif; font-weight: 400; }
.badge-star { color: #D4A72C; font-size: 6px; margin-top: 3px; }

/* Middle white section */
.badge-mid {
  flex: 1;
  background: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px 12px 6px;
  gap: 3px;
}
.badge-role-pill {
  background: #111;
  color: #fff;
  font-size: 7.5px;
  letter-spacing: 1.5px;
  padding: 3px 10px;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  text-transform: uppercase;
  border-radius: 2px;
  margin-bottom: 2px;
}
.badge-name {
  font-size: 18px;
  font-weight: 700;
  color: #000;
  text-align: center;
  letter-spacing: 0.3px;
  line-height: 1.1;
}
.badge-full {
  font-size: 7.5px;
  color: #888;
  letter-spacing: 1px;
  font-family: 'Inter', sans-serif;
  text-transform: uppercase;
  margin-top: 1px;
}
.badge-divider-line {
  display: flex;
  align-items: center;
  gap: 4px;
  margin: 4px 0;
}
.badge-divider-line::before, .badge-divider-line::after { content:''; flex:1; height:1px; background:#ddd; }
.badge-divider-dot { color: #ccc; font-size: 5px; }

/* QR code */
.badge-qr {
  width: 90px;
  height: 90px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.badge-qr canvas, .badge-qr img { width: 90px !important; height: 90px !important; }
.badge-id {
  font-size: 7px;
  color: #999;
  letter-spacing: 2px;
  font-family: 'Inter', monospace;
  margin-top: 1px;
}

/* Bottom black strip */
.badge-bot {
  background: #000;
  flex: 0 0 12%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.badge-bot-line { flex: 1; height: 1px; background: rgba(255,255,255,0.2); max-width: 20px; }
.badge-theme {
  font-size: 8px;
  letter-spacing: 3px;
  color: #fff;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  text-transform: uppercase;
}

/* ── Print styles ── */
@media print {
  body { background: #fff; color: #000; }
  .controls, .url-area, .url-note, .count-bar, .no-print { display: none !important; }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 54mm);
    gap: 6mm;
    padding: 10mm;
  }
  .badge {
    width: 54mm;
    height: 86mm;
    box-shadow: none;
    border: 0.5pt solid #ddd;
    border-radius: 3mm;
    break-inside: avoid;
  }
  .badge-fol { font-size: 24pt; }
  .badge-name { font-size: 11pt; }
  .badge-role-pill { font-size: 5pt; }
  .badge-qr { width: 18mm; height: 18mm; }
  .badge-qr canvas, .badge-qr img { width: 18mm !important; height: 18mm !important; }
}
</style>
</head>

<div class="controls">

  { name:'DR.TAN',       full:'TAN CZHIA HAO',                role:'Doctor',     outlet:'SS2' },
  { name:'DR CASSANDRA', full:'CHAN QING YAN',                role:'Doctor',     outlet:'SS2' },
  { name:'DR CHIN WEI',  full:'KHOO CHIN WEI',                role:'Doctor',     outlet:'SS2', notAttending:true },
  { name:'DR EUNICE',    full:'CHAN EUNICE',                  role:'Doctor',     outlet:'SS2' },
  { name:'DR WEN YUN',   full:'LOO WEN YUN',                  role:'Doctor',     outlet:'SS2' }
];

// =====================================================================
// BUILD BADGES
// =====================================================================
let currentFilter = [];

function getBaseUrl() {
  return (document.getElementById('baseUrl').value || '').trim();
}

function buildBadge(p, idx) {
  const pid = 'P' + String(idx + 1).padStart(3, '0');
  const idLabel = pid.replace('P', '') + String(idx+1).padStart(5,'0').slice(2);
  const url = getBaseUrl() + '?id=' + pid;
  const qrId = 'qr-' + pid;
  const na = p.notAttending ? ' style="opacity:0.45"' : '';

  return `
    <div class="badge"${na} data-outlet="${p.outlet}" data-name="${p.name.toLowerCase()} ${p.full.toLowerCase()}" data-pid="${pid}">
      <div class="badge-top">
        <div class="badge-fol">FOL</div>
        <div class="badge-year-row">
          <div class="badge-year-line"></div>
          <div class="badge-year">2 0 2 6</div>
          <div class="badge-year-line"></div>
        </div>
        <div class="badge-star">✦</div>
      </div>
      <div class="badge-mid">
        <div class="badge-role-pill">${p.role}${p.notAttending ? ' · N/A' : ''}</div>
        <div class="badge-name">${p.name}</div>
        <div class="badge-full">${p.full}</div>
        <div class="badge-divider-line"><span class="badge-divider-dot">✦</span></div>
        <div class="badge-qr" id="${qrId}"></div>
        <div class="badge-id">${pid} · ${p.outlet}</div>
      </div>
      <div class="badge-bot">
        <div class="badge-bot-line"></div>
        <div class="badge-theme">— BREAK TODAY · BUILD TOMORROW —</div>
        <div class="badge-bot-line"></div>
      </div>
    </div>`;
}

function generateQR(pid, url) {
  const el = document.getElementById('qr-' + pid);
  if (!el || el.children.length > 0) return;
  try {
    new QRCode(el, {
      text: url,
      width: 64,
      height: 64,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  } catch(e) {
    el.innerHTML = `<div style="width:90px;height:90px;border:1px solid #ccc;display:flex;align-items:center;justify-content:center;font-size:8px;color:#999;text-align:center">QR<br>${pid}</div>`;
  }
}

function renderBadges(list) {
  const grid = document.getElementById('badgeGrid');
  grid.innerHTML = list.map((p, localIdx) => {
    const globalIdx = PARTICIPANTS.indexOf(p);
    return buildBadge(p, globalIdx);
  }).join('');

  // Generate QR codes after DOM is ready
  requestAnimationFrame(() => {
    const base = getBaseUrl();
    list.forEach(p => {
      const globalIdx = PARTICIPANTS.indexOf(p);
      const pid = 'P' + String(globalIdx + 1).padStart(3, '0');
      generateQR(pid, base + '?id=' + pid);
    });
    document.getElementById('countBar').textContent =
      `Showing ${list.length} badges${list.length < PARTICIPANTS.length ? ' of ' + PARTICIPANTS.length + ' total' : ''}`;
  });
}

function filterBadges() {
  const outlet = document.getElementById('filterOutlet').value;
  const search = document.getElementById('searchInput').value.toLowerCase().trim();
  let list = PARTICIPANTS;
  if (outlet) list = list.filter(p => p.outlet === outlet);
  if (search) list = list.filter(p =>
    p.name.toLowerCase().includes(search) || p.full.toLowerCase().includes(search)
  );
  renderBadges(list);
}

function resetFilter() {
  document.getElementById('filterOutlet').value = '';
  document.getElementById('searchInput').value = '';
  renderBadges(PARTICIPANTS);
}

function rebuildQRs() {
  filterBadges();
}

// Initial render
renderBadges(PARTICIPANTS);
</script>
</body>
