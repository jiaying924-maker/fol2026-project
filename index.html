<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">

<title>FOL 2026 · Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0C0C0C; --card: #181818; --card2: #222;
  --gold: #D4A72C; --gold2: #F0D980; --gold3: rgba(212,167,44,0.12);
  --text: #E5E5E5; --muted: #777; --border: rgba(212,167,44,0.18);
  --green: #4CAF50; --red: #CC3333; --blue: #4A9EDA;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Inter','Noto Sans SC',system-ui,sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }

/* ── Hero ── */
.hero { background: #000; padding: 28px 20px 36px; text-align: center; position: relative; overflow: hidden; }
.hero::after { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 0%, rgba(212,167,44,0.08) 0%, transparent 65%); pointer-events: none; }
.fol-logo { font-family: 'Cormorant Garamond', serif; font-size: 64px; font-weight: 700; letter-spacing: 14px; color: #fff; line-height: 1; }
.fol-year { font-size: 11px; letter-spacing: 8px; color: var(--gold); margin-top: 6px; text-transform: uppercase; }
.hero-divider { display: flex; align-items: center; gap: 10px; max-width: 160px; margin: 14px auto; }
.hero-divider::before, .hero-divider::after { content: ''; flex: 1; height: 1px; background: var(--gold); opacity: 0.35; }
.hero-star { color: var(--gold); font-size: 9px; }

/* ── Participant info ── */
.p-section { text-align: center; padding: 24px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.role-pill { display: inline-block; background: #000; border: 1px solid var(--gold); color: var(--gold); font-size: 10px; font-weight: 600; letter-spacing: 2.5px; padding: 5px 14px; border-radius: 2px; text-transform: uppercase; margin-bottom: 14px; }
.p-name { font-family: 'Cormorant Garamond', serif; font-size: 44px; font-weight: 700; color: #fff; line-height: 1.05; letter-spacing: 0.5px; }
.p-full { font-size: 12px; color: var(--muted); margin-top: 5px; letter-spacing: 1px; text-transform: uppercase; }
.tags { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 12px; }
.tag { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; padding: 4px 12px; border-radius: 99px; }
.tag-outlet { background: rgba(74,158,218,0.1); border: 1px solid rgba(74,158,218,0.3); color: #7bb8e0; }
.tag-present { background: rgba(76,175,80,0.1); border: 1px solid rgba(76,175,80,0.35); color: #81C784; }
.tag-absent { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); color: var(--muted); }

/* ── Sections ── */
.sections { padding: 14px 16px 40px; display: flex; flex-direction: column; gap: 12px; max-width: 480px; margin: 0 auto; }
.card { background: var(--card); border-radius: 18px; overflow: hidden; border: 1px solid rgba(255,255,255,0.055); }
.card-head { display: flex; align-items: center; gap: 10px; padding: 15px 18px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.card-icon { font-size: 20px; line-height: 1; }
.card-title { font-size: 13px; font-weight: 600; letter-spacing: 0.3px; }
.card-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
.card-body { padding: 16px 18px; }
.empty-note { text-align: center; color: var(--muted); font-size: 13px; font-style: italic; padding: 8px 0; }

/* ── Angel's Whisper ── */
.whisper-sealed { display: flex; flex-direction: column; align-items: center; padding: 22px 0 18px; cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none; }
.envelope { font-size: 56px; animation: float 3s ease-in-out infinite; filter: drop-shadow(0 6px 16px rgba(212,167,44,0.35)); margin-bottom: 12px; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
.whisper-hint { font-size: 11px; color: var(--gold); letter-spacing: 1.5px; text-transform: uppercase; animation: blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
.whisper-open { display: none; text-align: center; padding: 6px 0; }
.whisper-open.revealed { display: block; animation: fadeIn 0.6s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.whisper-label { font-size: 10px; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; margin-bottom: 14px; }
.whisper-text { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-style: italic; line-height: 1.65; color: #fff; padding: 0 4px; }
.whisper-from { font-size: 11px; color: var(--muted); margin-top: 14px; }
.whisper-admin-edit { margin-top: 12px; }

/* ── Attendance ── */
.attend-body { text-align: center; padding: 8px 0; }
.attend-status-txt { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
.attend-status-txt.ok { color: #81C784; }
.attend-status-txt.no { color: var(--muted); }
.attend-time-txt { font-size: 11px; color: var(--muted); margin-top: 6px; }

/* ── Marks ── */
.marks-count { text-align: center; margin-bottom: 12px; }
.marks-num { font-family: 'Cormorant Garamond', serif; font-size: 40px; font-weight: 700; color: var(--gold); line-height: 1; }
.marks-num-label { font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px; }
.marks-chips { display: flex; flex-wrap: wrap; gap: 7px; }
.mark-chip { display: flex; align-items: center; gap: 7px; background: var(--gold3); border: 1px solid rgba(212,167,44,0.22); border-radius: 99px; padding: 7px 13px; }
.mark-chip .me { font-size: 17px; }
.mark-chip .ml { font-size: 12px; color: var(--gold2); font-weight: 500; }
.mark-chip .mb { font-size: 10px; color: var(--muted); }

/* ── Growth Timeline ── */
.timeline { display: flex; flex-direction: column; gap: 0; }
.tl-item { display: flex; gap: 12px; padding-bottom: 18px; position: relative; }
.tl-item:last-child { padding-bottom: 0; }
.tl-item:not(:last-child)::before { content:''; position:absolute; left:15px; top:30px; bottom:0; width:2px; background:rgba(212,167,44,0.12); }
.tl-dot { width:32px; height:32px; border-radius:50%; background:var(--gold3); border:2px solid rgba(212,167,44,0.3); display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
.tl-content {}
.tl-note { font-size:14px; line-height:1.55; color:var(--text); }
.tl-meta { font-size:10px; color:var(--muted); margin-top:4px; }

/* ── Messages ── */
.msg-form { display: flex; flex-direction: column; gap: 9px; margin-bottom: 16px; }
.inp { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:10px 14px; color:var(--text); font-size:13px; font-family:inherit; outline:none; width:100%; transition:border-color .2s; }
.inp:focus { border-color:var(--gold); }
.inp::placeholder { color:var(--muted); }
textarea.inp { resize:vertical; min-height:70px; }
.msgs-list { display:flex; flex-direction:column; gap:9px; }
.msg-item { background:rgba(255,255,255,0.038); border-radius:12px; padding:12px 14px; border-left:2px solid rgba(212,167,44,0.28); }
.msg-from { font-size:12px; font-weight:600; color:var(--gold2); margin-bottom:4px; }
.msg-text { font-size:13px; line-height:1.5; }
.msg-time { font-size:10px; color:var(--muted); margin-top:4px; }

/* ── Buttons ── */
.btn { display:flex; align-items:center; justify-content:center; gap:7px; border:none; border-radius:11px; padding:12px 20px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; transition:all .18s; letter-spacing:0.3px; width:100%; }
.btn-gold { background:var(--gold); color:#000; }
.btn-gold:hover { background:var(--gold2); }
.btn-outline { background:transparent; border:1px solid rgba(255,255,255,0.18); color:var(--text); }
.btn-outline:hover { border-color:var(--gold); color:var(--gold); }
.btn-green { background:rgba(76,175,80,0.12); border:1px solid rgba(76,175,80,0.35); color:#81C784; }
.btn-red { background:rgba(204,51,51,0.1); border:1px solid rgba(204,51,51,0.3); color:#f08080; }
.btn:disabled { opacity:.45; cursor:default; pointer-events:none; }
.btn-sm { padding:8px 14px; font-size:12px; border-radius:8px; width:auto; }

/* ── Admin Panel ── */
.admin-card { background:rgba(212,167,44,0.03); border:1px solid rgba(212,167,44,0.2); border-radius:18px; padding:18px; display:none; }
.admin-card.on { display:block; animation:fadeIn .3s ease; }
.admin-hdr { font-size:10px; letter-spacing:2px; color:var(--gold); text-transform:uppercase; margin-bottom:16px; display:flex; align-items:center; gap:6px; font-weight:600; }
.admin-block { margin-bottom:18px; }
.admin-label { font-size:10px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:8px; font-weight:500; }
.mark-btns { display:flex; flex-wrap:wrap; gap:7px; }
.mark-btn { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:99px; padding:7px 13px; font-size:13px; cursor:pointer; color:var(--text); font-family:inherit; transition:all .18s; }
.mark-btn:hover { background:var(--gold3); border-color:var(--gold); }

/* ── PIN Overlay ── */
.pin-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.82); backdrop-filter:blur(8px); z-index:999; align-items:center; justify-content:center; padding:20px; }
.pin-bg.on { display:flex; }
.pin-box { background:var(--card); border-radius:22px; padding:30px 24px; max-width:320px; width:100%; border:1px solid rgba(212,167,44,0.2); text-align:center; }
.pin-ttl { font-size:20px; font-weight:700; margin-bottom:6px; }
.pin-sub { font-size:13px; color:var(--muted); margin-bottom:22px; }
.pin-inp { width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.15); border-radius:10px; padding:13px; font-size:18px; letter-spacing:5px; text-align:center; color:var(--text); font-family:inherit; outline:none; margin-bottom:10px; }
.pin-inp:focus { border-color:var(--gold); }
.pin-err { font-size:12px; color:var(--red); min-height:18px; margin-bottom:10px; }

/* ── Toast ── */
.toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(80px); background:#2a2a2a; border:1px solid rgba(212,167,44,0.25); color:var(--text); padding:11px 22px; border-radius:99px; font-size:13px; font-weight:500; z-index:9999; transition:transform .3s ease; white-space:nowrap; }
.toast.show { transform:translateX(-50%) translateY(0); }

/* ── Committee link ── */
.committee-link { text-align:center; padding:28px 0 12px; }
.committee-link button { background:none; border:none; color:rgba(255,255,255,0.18); font-size:11px; cursor:pointer; font-family:inherit; padding:8px; letter-spacing:1px; }
.committee-link button:hover { color:var(--gold); }

/* ── Directory ── */
.dir-wrap { max-width: 480px; margin: 0 auto; padding: 0 16px 40px; }
.dir-search-box { position: relative; margin: 16px 0 10px; }
.dir-search-box input { width:100%; background:var(--card); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:12px 14px 12px 40px; font-size:14px; color:var(--text); font-family:inherit; outline:none; transition:border-color .2s; }
.dir-search-box input:focus { border-color:var(--gold); }
.dir-search-box input::placeholder { color:var(--muted); }
.dir-search-icon { position:absolute; left:13px; top:50%; transform:translateY(-50%); font-size:16px; }
.dir-scan-btn { width:100%; display:flex; align-items:center; justify-content:center; gap:10px; background:var(--gold); color:#000; border:none; border-radius:12px; padding:14px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; margin-bottom:14px; transition:background .18s; }
.dir-scan-btn:hover { background:var(--gold2); }
.dir-scanner-box { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; margin-bottom:14px; display:none; }
.dir-scanner-box.on { display:block; }
.dir-scanner-inner { width:100%; aspect-ratio:1; position:relative; }
#dir-qr-reader { width:100%!important; }
#dir-qr-reader video { width:100%!important; height:auto!important; border-radius:0; }
.dir-scanner-close { width:100%; background:rgba(255,255,255,0.05); border:none; border-top:1px solid var(--border); color:var(--muted); padding:10px; font-size:12px; cursor:pointer; font-family:inherit; }
.dir-scanner-close:hover { color:var(--text); }
.dir-outlet-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
.dir-outlet-btn { background:var(--card); border:1px solid var(--border); color:var(--muted); font-size:10px; font-weight:600; padding:5px 10px; border-radius:6px; cursor:pointer; letter-spacing:0.5px; transition:all .15s; }
.dir-outlet-btn:hover,.dir-outlet-btn.active { background:var(--gold3); border-color:rgba(212,167,44,0.4); color:var(--gold); }
.dir-count { font-size:11px; color:var(--muted); margin-bottom:10px; letter-spacing:0.5px; }
.dir-list { display:flex; flex-direction:column; gap:6px; }
.dir-item { display:flex; align-items:center; gap:12px; background:var(--card); border:1px solid rgba(255,255,255,0.05); border-radius:12px; padding:12px 14px; cursor:pointer; transition:all .18s; text-decoration:none; color:inherit; }
.dir-item:hover { background:var(--card2); border-color:rgba(212,167,44,0.2); transform:translateX(3px); }
.dir-avatar { width:38px; height:38px; border-radius:50%; background:var(--gold3); border:1px solid rgba(212,167,44,0.25); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; color:var(--gold); flex-shrink:0; font-family:'Cormorant Garamond',serif; }
.dir-info { flex:1; min-width:0; }
.dir-name { font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.dir-meta { font-size:11px; color:var(--muted); margin-top:2px; }
.dir-outlet-tag { background:rgba(74,158,218,0.1); border:1px solid rgba(74,158,218,0.25); color:#7bb8e0; font-size:10px; padding:3px 9px; border-radius:99px; flex-shrink:0; font-weight:500; }
.dir-arrow { color:var(--muted); font-size:14px; flex-shrink:0; }

.page-foot { text-align:center; padding:0 0 24px; font-size:10px; color:rgba(255,255,255,0.12); letter-spacing:1.5px; }

@media (max-width:400px) {
  .fol-logo { font-size:52px; }
  .p-name { font-size:36px; }
}
</style>
</head>

// =====================================================================
// FIREBASE / LOCALSTORAGE ABSTRACTION
// =====================================================================
const USE_FIREBASE = FB_CONFIG.apiKey !== "PASTE_API_KEY";
let db = null;
if (USE_FIREBASE) {
  try {
    firebase.initializeApp(FB_CONFIG);
    db = firebase.firestore();
  } catch(e) { console.warn('Firebase init failed, using localStorage', e); }
}

function lsKey(pid) { return 'fol2026_' + pid; }
function lsGet(pid) { try { return JSON.parse(localStorage.getItem(lsKey(pid)) || '{}'); } catch(e){ return {}; } }
function lsSet(pid, data) {
  const cur = lsGet(pid);
  const merged = deepMerge(cur, data);
  localStorage.setItem(lsKey(pid), JSON.stringify(merged));
}
function deepMerge(a, b) {
  const r = { ...a };
  for (const k of Object.keys(b)) {
    if (Array.isArray(b[k])) r[k] = b[k];
    else if (b[k] && typeof b[k] === 'object' && !Array.isArray(b[k])) r[k] = deepMerge(a[k] || {}, b[k]);
    else r[k] = b[k];
  }
  return r;
}

async function dbLoad(pid) {
  if (db) {
    try {
      const snap = await db.collection('fol2026').doc(pid).get();
      return snap.exists ? snap.data() : {};
    } catch(e) { return lsGet(pid); }
  }
  return lsGet(pid);
}

async function dbSave(pid, data) {
  if (db) {
    try { await db.collection('fol2026').doc(pid).set(data, { merge: true }); return; } catch(e) {}
  }
  lsSet(pid, data);
}

async function dbArrayAdd(pid, field, item) {
  if (db) {
    try {
      await db.collection('fol2026').doc(pid).set(
        { [field]: firebase.firestore.FieldValue.arrayUnion(item) },
        { merge: true }
      );
      return;
    } catch(e) {}
  }
  const cur = lsGet(pid);
  const arr = Array.isArray(cur[field]) ? cur[field] : [];
  arr.push(item);
  cur[field] = arr;
  localStorage.setItem(lsKey(pid), JSON.stringify(cur));
}

function fmtTime(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('en-MY', { day:'numeric', month:'short' }) + ' ' +
         d.toLocaleTimeString('en-MY', { hour:'2-digit', minute:'2-digit' });
}
function now() { return USE_FIREBASE && db ? firebase.firestore.Timestamp.now() : new Date().toISOString(); }

async function revealWhisper() {
  const sealed = document.getElementById('whisperSealed');
  const open = document.getElementById('whisperOpen');
  if (!sealed || !open) return;
  sealed.style.display = 'none';
  open.classList.add('revealed');
  DATA.angelRevealed = true;
  await dbSave(PID, { angelRevealed: true });
  toast('✨ Your Angel\'s Whisper is revealed!');
}

async function saveWhisper() {
  const txt = (document.getElementById('whisperInput')?.value || '').trim();
  if (!txt) return toast('Please write a message first');
  await dbSave(PID, { angelWhisper: txt, angelRevealed: false });
  DATA.angelWhisper = txt;
  DATA.angelRevealed = false;
  toast('💌 Angel\'s Whisper saved!');
  render();
}

async function markAttendance() {
  const btn = event?.target;
  if (btn) btn.disabled = true;
  const entry = { present: true, time: now(), by: IS_ADMIN ? 'Committee' : 'Self' };
  await dbSave(PID, { attendance: entry });
  DATA.attendance = entry;
  toast('✅ Attendance marked!');
  render();
}

async function unmarkAttendance() {
  await dbSave(PID, { attendance: { present: false, time: null, by: null } });
  DATA.attendance = { present: false };
  toast('↩ Check-in undone');
  render();
}

async function addMark(typeIdx) {
  const mt = MARK_TYPES[typeIdx];
  const note = (document.getElementById('markNote')?.value || '').trim();
  const mark = { emoji: mt.emoji, label: mt.label, cn: mt.cn, by: 'Committee', note, time: now() };
  await dbArrayAdd(PID, 'marks', mark);
  DATA.marks = DATA.marks || [];
  DATA.marks.push(mark);
  toast(`${mt.emoji} Mark awarded: ${mt.label}!`);
  render();
}

async function addGrowth() {
  const txt = (document.getElementById('growthInput')?.value || '').trim();
  if (!txt) return toast('Please write a growth note first');
  const entry = { text: txt, by: 'Committee', time: now() };
  await dbArrayAdd(PID, 'growth', entry);
  DATA.growth = DATA.growth || [];
  DATA.growth.push(entry);
  toast('🌱 Growth note added!');
  render();
}

async function leaveMessage() {
  const from = (document.getElementById('msgFrom')?.value || '').trim();
  const text = (document.getElementById('msgText')?.value || '').trim();
  if (!from || !text) return toast('Please fill in your name and message');
  const msg = { from, text, time: now() };
  await dbArrayAdd(PID, 'messages', msg);
  DATA.messages = DATA.messages || [];
  DATA.messages.push(msg);
  toast('💌 Message sent!');
  render();
}

function goBack() {
  if (!IS_ADMIN) return;
  history.pushState({}, '', location.pathname);
  PID = ''; P = null; DATA = {}; IS_ADMIN = sessionStorage.getItem('fol_admin') === '1';
  renderDirectory();
}

// =====================================================================
// PIN / ADMIN
// =====================================================================
function openPin() {
  if (IS_ADMIN) { IS_ADMIN = false; sessionStorage.removeItem('fol_admin'); render(); toast('Committee mode off'); return; }
  document.getElementById('pinBg').classList.add('on');
  setTimeout(() => document.getElementById('pinInput')?.focus(), 200);
}
function verifyPin() {
  const val = document.getElementById('pinInput').value;
  if (val === COMMITTEE_PIN) {
    IS_ADMIN = true;
    sessionStorage.setItem('fol_admin', '1');
    document.getElementById('pinBg').classList.remove('on');
    document.getElementById('pinInput').value = '';
    document.getElementById('pinErr').textContent = '';
    render();
    toast('🔓 Committee mode activated');
  } else {
    document.getElementById('pinErr').textContent = 'Incorrect PIN. Please try again.';
    document.getElementById('pinInput').value = '';
    document.getElementById('pinInput').focus();
  }
}
document.getElementById('pinInput')?.addEventListener('keydown', e => { if (e.key === 'Enter') verifyPin(); });

// =====================================================================
// TOAST
// =====================================================================
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// =====================================================================
// DIRECTORY — shown when no ?id= param
// =====================================================================
let dirOutlet = '';
let qrScanner = null;

function renderDirectory() {
  document.getElementById('app').innerHTML = `
    <div class="hero">
      <div class="fol-logo">FOL</div>
      <div class="fol-year">— &nbsp; 2 0 2 6 &nbsp; —</div>
      <div class="hero-divider"><span class="hero-star">✦</span></div>
    </div>
    <div class="dir-wrap">
      <!-- Scanner -->
      <button class="dir-scan-btn" onclick="toggleScanner()">📷 Scan QR Badge</button>
      <div class="dir-scanner-box" id="dirScannerBox">
        <div id="dir-qr-reader"></div>
        <button class="dir-scanner-close" onclick="stopScanner()">✕ Close Scanner</button>
      </div>

      <!-- Search -->
      <div class="dir-search-box">
        <span class="dir-search-icon">🔍</span>
        <input type="text" id="dirSearch" placeholder="Search name or full name..." oninput="filterDir()">
      </div>

      <!-- Outlet filter -->
      <div class="dir-outlet-row" id="dirOutlets">
        <button class="dir-outlet-btn active" data-o="" onclick="setDirOutlet(this)">All</button>
        ${['HQ','BM','GL','GY','RU','MA','SU','JB','CL','PC','SS2','KL','PG']
          .map(o=>`<button class="dir-outlet-btn" data-o="${o}" onclick="setDirOutlet(this)">${o}</button>`).join('')}
      </div>

      <div class="dir-count" id="dirCount"></div>
      <div class="dir-list" id="dirList"></div>
    </div>
  `;
  renderDirList();
}

function renderDirList() {
  const q = (document.getElementById('dirSearch')?.value || '').toLowerCase().trim();
  const list = PARTICIPANTS.map((p, i) => ({ p, i })).filter(({ p }) => {
    if (dirOutlet && p.outlet !== dirOutlet) return false;
    if (q && !p.name.toLowerCase().includes(q) && !p.full.toLowerCase().includes(q)) return false;
    return true;
  });

  const el = document.getElementById('dirList');
  const countEl = document.getElementById('dirCount');
  if (!el) return;

  countEl.textContent = `${list.length} participant${list.length !== 1 ? 's' : ''}`;

  el.innerHTML = list.map(({ p, i }) => {
    const pid = 'P' + String(i + 1).padStart(3, '0');
    const initials = p.name.replace(/^DR\.?\s*/i, '').trim().slice(0, 2).toUpperCase();
    return `
      <div class="dir-item" onclick="loadProfile(${i})">
        <div class="dir-avatar">${initials}</div>
        <div class="dir-info">
          <div class="dir-name">${p.name}</div>
          <div class="dir-meta">${p.full} · ${p.role}${p.notAttending ? ' · <span style="color:#f08080">Not attending</span>' : ''}</div>
        </div>
        <span class="dir-outlet-tag">${p.outlet}</span>
        <span class="dir-arrow">›</span>
      </div>`;
  }).join('');
}

function filterDir() { renderDirList(); }

function setDirOutlet(btn) {
  document.querySelectorAll('.dir-outlet-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  dirOutlet = btn.dataset.o;
  renderDirList();
}

function toggleScanner() {
  const box = document.getElementById('dirScannerBox');
  if (box.classList.contains('on')) { stopScanner(); return; }
  box.classList.add('on');
  startScanner();
}

function startScanner() {
  if (!window.Html5Qrcode) { toast('Scanner library not loaded — try refreshing'); return; }
  qrScanner = new Html5Qrcode('dir-qr-reader');
  qrScanner.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 220, height: 220 } },
    (decodedText) => {
      stopScanner();
      // Extract id param from scanned URL
      try {
        const url = new URL(decodedText);
        const raw = url.searchParams.get('id') || '';
        const idx = parseInt(raw.replace(/\D/g,''), 10) - 1;
        if (idx >= 0 && idx < PARTICIPANTS.length) { loadProfile(idx); return; }
      } catch(e) {}
      // Try plain id like "P001"
      const m = decodedText.match(/P?0*(\d+)/);
      if (m) { const idx = parseInt(m[1], 10) - 1; if (idx >= 0 && idx < PARTICIPANTS.length) { loadProfile(idx); return; } }
      toast('QR not recognised — try selecting from the list');
    },
    () => {}
  ).catch(() => toast('Camera access denied — please allow camera permission'));
}

function stopScanner() {
  if (qrScanner) { qrScanner.stop().catch(()=>{}); qrScanner = null; }
  const box = document.getElementById('dirScannerBox');
  if (box) { box.classList.remove('on'); box.innerHTML = '<div id="dir-qr-reader"></div><button class="dir-scanner-close" onclick="stopScanner()">✕ Close Scanner</button>'; }
}

async function loadProfile(idx) {
  stopScanner();
  PID = 'P' + String(idx + 1).padStart(3, '0');
  P = PARTICIPANTS[idx];
  if (sessionStorage.getItem('fol_admin') === '1') IS_ADMIN = true;
  DATA = await dbLoad(PID);
  // Update URL without reload
  history.pushState({}, '', location.pathname + '?id=' + PID);
  render();
}

// =====================================================================
// INIT
// =====================================================================
(async function init() {
  const params = new URLSearchParams(location.search);
  const raw = params.get('id') || '';
  const idx = parseInt(raw.replace(/\D/g,''), 10) - 1;

  if (sessionStorage.getItem('fol_admin') === '1') IS_ADMIN = true;

  // No valid ID → show directory only if authenticated
  if (!raw || isNaN(idx) || idx < 0 || idx >= PARTICIPANTS.length) {
    if (!IS_ADMIN) {
      document.getElementById('app').innerHTML = `
        <div class="hero">
          <div class="fol-logo">FOL</div>
          <div class="fol-year">— &nbsp; 2 0 2 6 &nbsp; —</div>
        </div>
        <div style="text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;line-height:1.8">
          <p>👤 Please scan your badge QR code to view your profile</p>
          <p style="font-size:12px;margin-top:20px;opacity:0.7">If you don't have access, ask a committee member for assistance</p>
          <button onclick="window.location.href='?admin=1'" style="margin-top:30px;background:var(--gold);color:#000;border:none;border-radius:10px;padding:12px 24px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">🔐 Committee Login</button>
        </div>
      `;
      return;
    }
    renderDirectory();
    return;
  }

  PID = 'P' + String(idx + 1).padStart(3, '0');
  P = PARTICIPANTS[idx];

  DATA = await dbLoad(PID);
  if (params.get('admin') === '1') openPin();
  render();
})();
</script>
</body>
</html>
